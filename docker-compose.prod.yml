services:
  auth:
    image: ${AUTH_IMAGE}
    init: true
    environment:
      DATABASE_URL: ${AUTH_DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      FRONTEND_BASE_URL: ${FRONTEND_BASE_URL}
      RABBITMQ_URL: ${RABBITMQ_URL}
      AWS_REGION: ${AWS_REGION}
    expose:
      - "8000"
    networks:
      - shop-net
    restart: unless-stopped

  product:
    image: ${PRODUCT_IMAGE}
    init: true
    environment:
      DATABASE_URL: ${PRODUCT_DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      AWS_REGION: ${AWS_REGION}
      S3_BUCKET: ${S3_BUCKET}
      IMAGES_CDN_URL: ${IMAGES_CDN_URL}
    expose:
      - "8000"
    networks:
      - shop-net
    restart: unless-stopped

  order:
    image: ${ORDER_IMAGE}
    init: true
    environment:
      DATABASE_URL: ${ORDER_DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      RABBITMQ_URL: ${RABBITMQ_URL}
      PRODUCT_URL_INTERNAL: http://product:8000
      AWS_REGION: ${AWS_REGION}
    expose:
      - "8000"
    depends_on:
      - product
    networks:
      - shop-net
    restart: unless-stopped

  notify:
    image: ${NOTIFY_IMAGE}
    init: true
    environment:
      RABBITMQ_URL: ${RABBITMQ_URL}
      AWS_REGION: ${AWS_REGION}
      SNS_TOPIC_ARN_NOTIFY: ${SNS_TOPIC_ARN_NOTIFY}
    expose:
      - "8000"
    networks:
      - shop-net
    restart: unless-stopped

  web:
    image: ${WEB_IMAGE}
    environment:
      VITE_AUTH_URL: ${VITE_AUTH_URL}
      VITE_PRODUCT_URL: ${VITE_PRODUCT_URL}
      VITE_ORDER_URL: ${VITE_ORDER_URL}
    expose:
      - "80"
    depends_on:
      - auth
      - product
      - order
    networks:
      - shop-net
    restart: unless-stopped

  gateway:
    image: ${GATEWAY_IMAGE}
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - web
      - auth
      - product
      - order
    networks:
      - shop-net
    restart: unless-stopped

networks:
  shop-net:
    driver: bridge