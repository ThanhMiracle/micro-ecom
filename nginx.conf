server {
  listen 80;
  server_name localhost;

  client_max_body_size 20m;
  proxy_read_timeout 300s;
  proxy_send_timeout 300s;

  # -----------------------
  # Frontend
  # -----------------------
  location / {
    proxy_pass http://web:80;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # -----------------------
  # Auth service
  # /api/auth/login -> auth:8000/login
  # -----------------------
  location /api/auth/ {
    proxy_pass http://auth:8000/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # -----------------------
  # Product service
  # /api/product/admin/products -> product:8000/admin/products
  # -----------------------
  location /api/product/ {
    proxy_pass http://product:8000/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # -----------------------
  # Product static files
  # /static/... -> product:8000/static/...
  # -----------------------
  location /static/ {
    proxy_pass http://product:8000/static/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    add_header Cache-Control "public, max-age=86400" always;
  }

  # -----------------------
  # Order service
  # -----------------------
  location /api/order/ {
    proxy_pass http://order:8000/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # -----------------------
  # Health check
  # -----------------------
  location /healthz {
    access_log off;
    return 200 "ok\n";
    add_header Content-Type text/plain;
  }
}